<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Platform Login — InvSync</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Barlow+Condensed:wght@500;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0b0d10; --surface: #13161b; --surface2: #1a1f27;
    --border: #242930; --border2: #2f3640;
    --text: #c6d0de; --muted: #4e5a6a;
    --accent: #d4f53c; --ok: #3dca7a; --danger: #f03d3d; --warn: #f0a500;
    --shopee: #ee4d2d; --lazada: #1a53f0; --tiktok: #25d4c8;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'Barlow Condensed', sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:var(--sans); height:100vh; display:flex; flex-direction:column; }

  .topbar {
    display:flex; align-items:center; justify-content:space-between;
    padding:12px 20px;
    background:var(--surface);
    border-bottom:1px solid var(--border);
    flex-shrink:0;
  }
  .topbar-left { display:flex; align-items:center; gap:14px; }
  .back-btn {
    font-family:var(--sans); font-size:13px; font-weight:600;
    letter-spacing:1px; text-transform:uppercase;
    padding:6px 14px; border:1px solid var(--border2);
    border-radius:3px; cursor:pointer;
    background:var(--surface2); color:var(--text);
    text-decoration:none; transition:all .2s;
  }
  .back-btn:hover { background:var(--border2); color:#fff; }
  .page-title { font-size:17px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:#fff; }
  .plat-name { letter-spacing:3px; }
  .plat-name.shopee { color:var(--shopee); }
  .plat-name.lazada { color:var(--lazada); }
  .plat-name.tiktok { color:var(--tiktok); }

  .status-bar {
    display:flex; align-items:center; gap:10px;
    padding:10px 20px;
    background:var(--surface2);
    border-bottom:1px solid var(--border);
    flex-shrink:0;
    font-size:13px;
  }
  .status-dot { width:8px; height:8px; border-radius:50%; background:var(--muted); }
  .status-dot.loading { background:var(--warn); animation:pulse 1s infinite; }
  .status-dot.ready   { background:var(--ok); box-shadow:0 0 6px var(--ok); }
  .status-dot.error   { background:var(--danger); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  .status-text { color:var(--text); }
  .status-hint { color:var(--muted); font-size:12px; margin-left:4px; }

  .btn {
    font-family:var(--sans); font-size:13px; font-weight:600;
    letter-spacing:1.5px; text-transform:uppercase;
    padding:7px 16px; border:1px solid var(--border2);
    border-radius:3px; cursor:pointer;
    background:var(--surface2); color:var(--text);
    transition:all .2s;
  }
  .btn:hover { background:var(--border2); color:#fff; }
  .btn-accent { background:var(--accent); color:#0b0d10; border-color:var(--accent); }
  .btn-accent:hover { background:#b8d930; }
  .btn-danger { color:var(--danger); border-color:rgba(240,61,61,.3); }
  .btn-danger:hover { background:rgba(240,61,61,.1); }
  .btn:disabled { opacity:.4; cursor:not-allowed; }

  .actions { display:flex; gap:8px; margin-left:auto; }

  /* VNC frame */
  .vnc-wrap {
    flex:1;
    position:relative;
    background:#000;
    overflow:hidden;
  }
  #vncFrame {
    width:100%; height:100%;
    border:none;
    display:block;
  }
  .vnc-placeholder {
    position:absolute; inset:0;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    gap:16px; color:var(--muted);
  }
  .vnc-placeholder .icon { font-size:48px; opacity:.2; }
  .vnc-placeholder p { font-size:14px; letter-spacing:1px; }

  /* Success overlay */
  .success-overlay {
    display:none;
    position:absolute; inset:0;
    background:rgba(11,13,16,.92);
    align-items:center; justify-content:center;
    flex-direction:column; gap:16px;
  }
  .success-overlay.show { display:flex; }
  .success-icon { font-size:56px; }
  .success-msg { font-size:20px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--ok); }
  .success-sub { font-size:13px; color:var(--muted); }

  #toast {
    position:fixed; bottom:20px; right:20px;
    padding:12px 18px; border-radius:4px;
    font-size:13px; font-weight:600;
    border-left:3px solid var(--accent);
    background:var(--surface2);
    display:none; z-index:999;
    box-shadow:0 8px 24px rgba(0,0,0,.4);
  }
  #toast.error { border-left-color:var(--danger); color:var(--danger); }
  #toast.ok    { border-left-color:var(--ok); color:var(--ok); }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <a class="back-btn" href="/">← Dashboard</a>
    <div class="page-title">Login — <span class="plat-name" id="platLabel">...</span></div>
  </div>
  <div class="actions">
    <button class="btn btn-danger" id="cancelBtn" onclick="cancelLogin()" disabled>Cancel</button>
    <button class="btn btn-accent" id="saveBtn" onclick="saveSession()" disabled>✓ I'm Logged In — Save Session</button>
  </div>
</div>

<div class="status-bar">
  <div class="status-dot loading" id="statusDot"></div>
  <span class="status-text" id="statusText">Opening browser...</span>
  <span class="status-hint" id="statusHint"></span>
</div>

<div class="vnc-wrap">
  <div class="vnc-placeholder" id="placeholder">
    <div class="icon">⬡</div>
    <p>Starting virtual browser...</p>
  </div>
  <iframe id="vncFrame" style="display:none"></iframe>
  <div class="success-overlay" id="successOverlay">
    <div class="success-icon">✓</div>
    <div class="success-msg">Session Saved!</div>
    <div class="success-sub" id="successSub">Redirecting to dashboard...</div>
  </div>
</div>

<div id="toast"></div>

<script>
const platform = window.location.pathname.split('/')[2] || 'shopee';
const host     = window.location.hostname;
const vncUrl   = `http://${host}:6080/vnc.html?autoconnect=true&resize=scale&show_dot=true&path=websockify`;

// Set platform label + color
const label = document.getElementById('platLabel');
label.textContent = platform.toUpperCase();
label.className = `plat-name ${platform}`;

async function api(path, method = 'GET') {
  const opts = { method, headers: {} };
  let r = await fetch(`/api${path}`, { ...opts, credentials: 'same-origin' });
  if (r.status === 401) {
    const next = encodeURIComponent(window.location.pathname + window.location.search);
    window.location.href = `/auth/login?next=${next}`;
    throw new Error('Authentication required');
  }
  const data = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(data.detail || r.statusText);
  return data;
}

function setStatus(text, hint = '', state = 'loading') {
  document.getElementById('statusText').textContent = text;
  document.getElementById('statusHint').textContent = hint;
  const dot = document.getElementById('statusDot');
  dot.className = `status-dot ${state}`;
}

function toast(msg, type = 'ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = type;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 4000);
}

async function init() {
  try {
    setStatus('Opening seller center browser...', 'This takes ~5 seconds', 'loading');
    await api(`/login/${platform}/start`, 'POST');

    // Give the browser a moment to load the page
    await new Promise(r => setTimeout(r, 3000));

    // Load noVNC
    document.getElementById('placeholder').style.display = 'none';
    const frame = document.getElementById('vncFrame');
    frame.src = vncUrl;
    frame.style.display = 'block';

    setStatus('Browser ready — log in below', 'When done, click "I\'m Logged In — Save Session"', 'ready');
    document.getElementById('saveBtn').disabled   = false;
    document.getElementById('cancelBtn').disabled = false;

  } catch(e) {
    setStatus('Failed to open browser', e.message, 'error');
    toast(e.message, 'error');
  }
}

async function saveSession() {
  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.textContent = 'Saving...';
  try {
    await api(`/login/${platform}/save`, 'POST');
    setStatus('Session saved!', '', 'ready');
    document.getElementById('cancelBtn').disabled = true;
    document.getElementById('successOverlay').classList.add('show');
    document.getElementById('successSub').textContent = `${platform} session active. Redirecting...`;
    setTimeout(() => window.location.href = '/', 2500);
  } catch(e) {
    toast('Save failed: ' + e.message, 'error');
    btn.disabled = false;
    btn.textContent = '✓ I\'m Logged In — Save Session';
  }
}

async function cancelLogin() {
  await api('/login/cancel', 'POST').catch(() => {});
  window.location.href = '/';
}

// Start immediately
init();
</script>
</body>
</html>
